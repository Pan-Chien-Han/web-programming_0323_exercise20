<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise20</title>

    <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
            }

            table {
                border-collapse: collapse;
                width: auto;
                text-align: left;
            }

            th, td {
                border: 2px solid black;
                padding: 10px;
            }

            th {
                background-color: #808080;
                color: white;
            }

            .yellow-row {
                background-color: #ffff00;
            }

            .white-row {
                background-color: #ffffff;
            }


            .fixed-box {
                position: fixed;
                top: 20px;
                right: 20px;
                width: 135px;
                height: 150px;
                border: 4px solid #76a04d;
                padding: 10px;
                background-color: white;
                box-sizing: border-box;
            }
        </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr class="yellow-row">
                <td>1</td>
                <td>1</td>
            </tr>
            <tr class="white-row">
                <td>2</td>
                <td>2</td>
            </tr>
            <tr class="yellow-row">
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>
</body>
</html>
